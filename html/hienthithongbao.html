<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị Thông báo</title>
    <!--<link rel="stylesheet" href="styles.css">-->
</head>
<body>

    <div>
        <h3>Thông báo</h3>
        <p id="message">Đây là một thông báo mẫu</p>
        <button onclick="closeNotification()">Đóng</button>
    </div>

    <script>
        let name = prompt("Nhập tên của bạn:");
        let yob = prompt("Nhập năm sinh của bạn:");
        window.alert("Xin chào " + name + "! Năm nay bạn đã " + (2026 - yob) + ". Chúc bạn một ngày tốt lành!");
    </script>

</body>
</html>
