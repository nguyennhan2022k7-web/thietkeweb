<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng cửu chương</title>
</head>
<body>

<form id="frmBCC">
    <label>Nhập vào 1 số:</label>
    <input type="number" id="txtSo" name="txtSo" min="1" max="10" value="2">

    <input type="button" value="In bảng cửu chương" onclick="inBCC()">
</form>

<div id="result"></div>

<script>
    function inBCC() {
        let n = document.getElementById("txtSo").value;
        let result = "";

        for (let i = 1; i <= 10; i++) {
            result += `${n} x ${i} = ${n * i}<br>`;
        }

        document.getElementById("result").innerHTML = result;
    }
</script>

</body>
</html>
